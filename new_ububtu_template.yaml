---
- name: Deploy Ubuntu VM on vCenter
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    datacenter_name: "Arakis"
    datastore_name: "vmhost01_DS01"
    esxi_host: "vmhost01.home"
    vm_folder: "Discovered virtual machine"
    vm_template: "ubuntu-noble-24.04-cloud-ansible"
    vm_guest_id: "ubuntu64Guest"
    vm_network: "VM Network"

    # VM Hardware defaults (override via AWX extra vars)
    vm_memory_mb: 4096
    vm_num_cpus: 2
    vm_disk_gb: 50
    vm_state: present

  pre_tasks:
    - name: Validate required variables are defined
      assert:
        that:
          - vm_name is defined and vm_name | length > 0
        fail_msg: "Required variable 'vm_name' must be set."

  tasks:
    - name: Deploy VM from template
      community.vmware.vmware_guest:
        validate_certs: false
        name: "{{ vm_name }}"
        guest_id: "{{ vm_guest_id }}"
        template: "{{ vm_template }}"
        datacenter: "{{ datacenter_name }}"
        datastore: "{{ datastore_name }}"
        esxi_hostname: "{{ esxi_host }}"
        folder: "{{ vm_folder }}"
        state: "{{ vm_state }}"
        disk:
          - size_gb: "{{ vm_disk_gb }}"
            type: thin
        hardware:
          memory_mb: "{{ vm_memory_mb }}"
          num_cpus: "{{ vm_num_cpus }}"
          scsi: paravirtual
          version: latest
        networks:
          - name: "{{ vm_network }}"
            device_type: vmxnet3
            connected: true
            start_connected: true
        customization:
          hostname: "{{ vm_name }}"
          dns_servers:
            - "{{ dns_server_1 | default('192.168.0.15') }}"
            - "{{ dns_server_2 | default('192.168.0.8') }}"
        wait_for_ip_address: yes
        wait_for_ip_address_timeout: 300
        wait_for_customization: true
      register: vm_result

    - name: Display deployed VM info
      debug:
        msg:
          - "VM Name    : {{ vm_result.instance.hw_name }}"
          - "Power State: {{ vm_result.instance.hw_power_status }}"
          - "IP Address : {{ vm_result.instance.ipv4 | default('Not yet assigned') }}"
      when: vm_result.instance is defined

    - name: Add new VM to in-memory inventory
      add_host:
        name: "{{ vm_result.instance.ipv4 }}"
        groups: newly_deployed_vms
      when:
        - vm_result.instance is defined
        - vm_result.instance.ipv4 is defined

- name: Post-deployment validation
  hosts: newly_deployed_vms
  gather_facts: yes
  tasks:
    - name: Confirm SSH is reachable
      wait_for_connection:
        timeout: 120

    - name: Print OS info
      debug:
        msg: "Successfully connected to {{ inventory_hostname }} running {{ ansible_distribution }} {{ ansible_distribution_version }}"